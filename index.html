<!DOCTYPE html>
<html>
<head>
    <title>Flappy Grade!</title>
        <!-- Favicon link -->
    <link rel="icon" type="image/png" sizes="32x32" href="wew.png">
    <!-- Alternative formats for better browser support -->
    <link rel="icon" type="image/x-icon" href="wew.png">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <style>
        body { 
            text-align: center; 
            background: #e0f7fa; 
            color: #2c3e50; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            padding: 10px;
            overflow: hidden;
            touch-action: manipulation;
        }
        canvas { 
            background: #87CEEB; 
            display: block; 
            margin: 0 auto; 
            border: 5px solid #fff; 
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            max-width: 100%;
            max-height: 80vh;
            cursor: pointer;
        }
        h1 { margin: 10px 0 5px 0; color: #006400; text-shadow: 1px 1px 0px white; font-size: 24px; }
        .info { font-size: 1rem; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Flappy Grade!</h1>
    <div class="info">Jump to pass!!!</div>
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let birdY = 250;
        let birdX = 60;
        let velocity = 0;
        let gravity = 0.22;
        let jump = -4.8;
        let gameOver = false;
        
        const grades = [];
        for (let i = 5; i >= 1; i -= 0.01) {
            grades.push(i.toFixed(2));
        }
        
        let gradeIndex = 0;
        let pipes = [];
        let pipeWidth = 60;
        let pipeGap = 160;
        let pipeSpeed = 2.2;

        let pencils = [];
        let pencilWidth = 50;
        let pencilHeight = 10;
        let pencilSpeed = 4.5;

        let clouds = [
            {x: 50, y: 60, speed: 0.2, scale: 0.8},
            {x: 220, y: 140, speed: 0.3, scale: 1.1},
            {x: 380, y: 40, speed: 0.15, scale: 0.7},
            {x: 150, y: 250, speed: 0.25, scale: 0.9}
        ];

        function resetGame() {
            birdY = 250;
            velocity = 0;
            gradeIndex = 0;
            pipes = [];
            pencils = [];
            gameOver = false;
            loop();
        }

        function handleAction(e) {
            if (e) e.preventDefault();
            if (gameOver) resetGame();
            else velocity = jump;
        }

        function createPipe() {
            let pipeTopHeight = Math.random() * (canvas.height - pipeGap - 120) + 60;
            // Added 'dy' for vertical movement and 'direction'
            pipes.push({ 
                x: canvas.width, 
                top: pipeTopHeight, 
                passed: false, 
                dy: Math.random() > 0.5 ? 1 : -1 // Vertical direction
            });
        }

        function createPencil() {
            let pencilY = Math.random() * (canvas.height - 50) + 25;
            pencils.push({ x: canvas.width + 100, y: pencilY });
        }

        function drawCloud(c) {
            ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
            ctx.beginPath();
            ctx.arc(c.x, c.y, 20 * c.scale, 0, Math.PI * 2);
            ctx.arc(c.x + 15 * c.scale, c.y - 10 * c.scale, 20 * c.scale, 0, Math.PI * 2);
            ctx.arc(c.x + 30 * c.scale, c.y, 20 * c.scale, 0, Math.PI * 2);
            ctx.fill();
        }

        function update() {
            if (gameOver) return;
            velocity += gravity;
            birdY += velocity;

            let currentGradeVal = parseFloat(grades[gradeIndex]);

            clouds.forEach(c => {
                c.x -= c.speed;
                if (c.x < -60) c.x = canvas.width + 60;
            });

            if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 240) {
                createPipe();
            }

            // --- TRIAL 1: PENCILS (Between 4.90 and 4.80) ---
            if (currentGradeVal <= 4.90 && currentGradeVal > 1.00) {
                if (Math.random() < 0.02) createPencil(); 
            }

            // Update and Collision: Pipes
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= pipeSpeed;

                // --- TRIAL 2: MOVING PIPES (Starts at 4.85) ---
                if (currentGradeVal <= 4.85) {
                    pipes[i].top += pipes[i].dy * 1.5; // Move up or down
                    // Bounce pipes if they go too high or low
                    if (pipes[i].top < 40 || pipes[i].top > canvas.height - pipeGap - 40) {
                        pipes[i].dy *= -1;
                    }
                }

                // Collision
                if (birdX + 30 > pipes[i].x && birdX < pipes[i].x + pipeWidth) {
                    if (birdY - 20 < pipes[i].top || birdY + 10 > pipes[i].top + pipeGap) {
                        endGame();
                    }
                }
                if (pipes[i].x + pipeWidth < birdX && !pipes[i].passed) {
                    pipes[i].passed = true;
                    if (gradeIndex < grades.length - 1) gradeIndex++;
                    else endGame();
                }
                if (pipes[i].x + pipeWidth < 0) pipes.splice(i, 1);
            }

            // Update and Collision: Pencils
            for (let i = pencils.length - 1; i >= 0; i--) {
                pencils[i].x -= pencilSpeed;
                if (birdX < pencils[i].x + pencilWidth &&
                    birdX + 40 > pencils[i].x &&
                    birdY - 20 < pencils[i].y + pencilHeight &&
                    birdY + 10 > pencils[i].y) {
                    endGame();
                }
                if (pencils[i].x + pencilWidth < 0) pencils.splice(i, 1);
            }

            if (birdY > canvas.height || birdY < 0) endGame();
        }

        function draw() {
            ctx.fillStyle = "#87CEEB";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            clouds.forEach(c => drawCloud(c));

            pipes.forEach(p => {
                ctx.fillStyle = "#27ae60";
                ctx.fillRect(p.x, 0, pipeWidth, p.top);
                ctx.fillRect(p.x, p.top + pipeGap, pipeWidth, canvas.height);
                ctx.fillStyle = "#1e8449";
                ctx.fillRect(p.x - 5, p.top - 20, pipeWidth + 10, 20);
                ctx.fillRect(p.x - 5, p.top + pipeGap, pipeWidth + 10, 20);
            });

            pencils.forEach(pen => {
                ctx.fillStyle = "#f1c40f"; 
                ctx.fillRect(pen.x, pen.y, pencilWidth - 10, pencilHeight);
                ctx.fillStyle = "#e84393"; 
                ctx.fillRect(pen.x + pencilWidth - 10, pen.y, 10, pencilHeight);
                ctx.fillStyle = "#333"; 
                ctx.beginPath();
                ctx.moveTo(pen.x, pen.y);
                ctx.lineTo(pen.x - 10, pen.y + (pencilHeight/2));
                ctx.lineTo(pen.x, pen.y + pencilHeight);
                ctx.fill();
            });

            ctx.fillStyle = "#006400";
            ctx.font = "bold 32px 'Arial Black', sans-serif";
            ctx.fillText(grades[gradeIndex], birdX, birdY);

            if (gameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.textAlign = "center";
                ctx.font = "bold 36px Arial";
                ctx.fillText(parseFloat(grades[gradeIndex]) <= 3.0 ? "YOU PASSED!" : "FAILED", canvas.width/2, canvas.height/2);
                ctx.font = "20px Arial";
                ctx.fillText("Grade: " + grades[gradeIndex], canvas.width/2, canvas.height/2 + 50);
                ctx.fillText("Tap to Retake", canvas.width/2, canvas.height/2 + 90);
                ctx.textAlign = "start";
            }
        }

        function endGame() { gameOver = true; }

        function loop() {
            update();
            draw();
            if (!gameOver) requestAnimationFrame(loop);
        }

        window.addEventListener('keydown', (e) => { if (e.code === 'Space') handleAction(e); });
        canvas.addEventListener('mousedown', (e) => { handleAction(e); });
        canvas.addEventListener('touchstart', (e) => { handleAction(e); }, {passive: false});

        resetGame();
    </script>
</body>
</html>
