<!DOCTYPE html>
<html>
<head>
    <title>Flappy Grade!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <style>
        body { 
            text-align: center; 
            background: #e0f7fa; 
            color: #2c3e50; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            padding: 10px;
            overflow: hidden; /* Prevents scrolling while playing */
            touch-action: manipulation;
        }
        canvas { 
            background: #87CEEB; 
            display: block; 
            margin: 0 auto; 
            border: 5px solid #fff; 
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            max-width: 100%; /* Responsive: Fits mobile screens */
            max-height: 80vh; /* Keeps it from being too tall */
            cursor: pointer;
        }
        h1 { margin: 10px 0 5px 0; color: #006400; text-shadow: 1px 1px 0px white; font-size: 24px; }
        .info { font-size: 1rem; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Flappy Grade!</h1>
    <div class="info">Tap or Press Space to Pass!</div>
    <canvas id="gameCanvas" width="400" height="500"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let birdY = 250;
        let birdX = 60;
        let velocity = 0;
        let gravity = 0.22;
        let jump = -4.8;
        let gameOver = false;

        //const grades = ["5", "5 hmmm","4","4","4","4","4.99","4.98","4.97", "4.96","4.95","hmmm", "3", "2.75", "2.50", "2.25", "2.00", "1.75", "1.50", "1.25", "1.00"];
        
        const grades = [];

        // We start at 5 and go down to 1. 
        // We use 0.01 as the step to get every single decimal point.
        for (let i = 5; i >= 1; i -= 0.01) {
            // .toFixed(2) turns the number into a string like "4.99"
            grades.push(i.toFixed(2));
        }

        console.log(grades);
        // Output: ["5.00", "4.99", "4.08" ... "1.00"]
        
        let gradeIndex = 0;

        let pipes = [];
        let pipeWidth = 60;
        let pipeGap = 160;
        let pipeSpeed = 2.2;

        let clouds = [
            {x: 50, y: 60, speed: 0.2, scale: 0.8},
            {x: 220, y: 140, speed: 0.3, scale: 1.1},
            {x: 380, y: 40, speed: 0.15, scale: 0.7},
            {x: 150, y: 250, speed: 0.25, scale: 0.9}
        ];

        function resetGame() {
            birdY = 250;
            velocity = 0;
            gradeIndex = 0;
            pipes = [];
            gameOver = false;
            loop();
        }

        function handleAction(e) {
            if (e) e.preventDefault(); // Prevents zooming/scrolling on tap
            if (gameOver) {
                resetGame();
            } else {
                velocity = jump;
            }
        }

        function createPipe() {
            let pipeTopHeight = Math.random() * (canvas.height - pipeGap - 120) + 60;
            pipes.push({ x: canvas.width, top: pipeTopHeight, passed: false });
        }

        function drawCloud(c) {
            ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
            ctx.beginPath();
            ctx.arc(c.x, c.y, 20 * c.scale, 0, Math.PI * 2);
            ctx.arc(c.x + 15 * c.scale, c.y - 10 * c.scale, 20 * c.scale, 0, Math.PI * 2);
            ctx.arc(c.x + 30 * c.scale, c.y, 20 * c.scale, 0, Math.PI * 2);
            ctx.fill();
        }

        function update() {
            if (gameOver) return;
            velocity += gravity;
            birdY += velocity;

            clouds.forEach(c => {
                c.x -= c.speed;
                if (c.x < -60) c.x = canvas.width + 60;
            });

            if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 240) {
                createPipe();
            }

            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= pipeSpeed;
                if (birdX + 20 > pipes[i].x && birdX < pipes[i].x + pipeWidth) {
                    if (birdY - 20 < pipes[i].top || birdY > pipes[i].top + pipeGap) {
                        endGame();
                    }
                }
                if (pipes[i].x + pipeWidth < birdX && !pipes[i].passed) {
                    pipes[i].passed = true;
                    if (gradeIndex < grades.length - 1) gradeIndex++;
                    else endGame();
                }
                if (pipes[i].x + pipeWidth < 0) pipes.splice(i, 1);
            }

            if (birdY > canvas.height || birdY < 0) endGame();
        }

        function draw() {
            ctx.fillStyle = "#87CEEB";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            clouds.forEach(c => drawCloud(c));

            ctx.fillStyle = "#27ae60";
            pipes.forEach(p => {
                ctx.fillRect(p.x, 0, pipeWidth, p.top);
                ctx.fillRect(p.x, p.top + pipeGap, pipeWidth, canvas.height);
                ctx.fillStyle = "#1e8449";
                ctx.fillRect(p.x - 5, p.top - 20, pipeWidth + 10, 20);
                ctx.fillRect(p.x - 5, p.top + pipeGap, pipeWidth + 10, 20);
                ctx.fillStyle = "#27ae60";
            });

            ctx.fillStyle = "#006400";
            ctx.font = "bold 32px 'Arial Black', sans-serif";
            ctx.fillText(grades[gradeIndex], birdX, birdY);

            if (gameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                let currentGrade = grades[gradeIndex];
                let val = parseFloat(currentGrade);
                let passed = !isNaN(val) && val <= 3.0;
                
                ctx.fillStyle = "white";
                ctx.textAlign = "center";
                ctx.font = "bold 36px Arial";
                ctx.fillText(passed ? "YOU PASSED!" : "FAILED", canvas.width/2, canvas.height/2);
                ctx.font = "20px Arial";
                ctx.fillText("Final Grade: " + currentGrade, canvas.width/2, canvas.height/2 + 50);
                ctx.fillText("Tap to Retake", canvas.width/2, canvas.height/2 + 90);
                ctx.textAlign = "start";
            }
        }

        function endGame() { gameOver = true; }

        function loop() {
            update();
            draw();
            if (!gameOver) requestAnimationFrame(loop);
        }

        // Listeners for Desktop and Mobile para natataptap
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') handleAction(e); });
        canvas.addEventListener('mousedown', (e) => { handleAction(e); });
        canvas.addEventListener('touchstart', (e) => { handleAction(e); }, {passive: false});
        //Roman Juan G. Eugenio I
        resetGame();
    </script>
</body>
</html>
